# =====================================================================
# Build bản tĩnh + deploy lên GitHub Pages.
# Mỗi lần push lên main: render template + slides → dist/ rồi publish.
#
# Bật một lần trong repo: Settings → Pages → Build and deployment →
# Source = "GitHub Actions".
# =====================================================================
name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài dependencies (jinja2 + pydantic)
        run: pip install -r backend/requirements.txt

      - name: Build static site → dist/
        run: python scripts/build_static.py --out dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

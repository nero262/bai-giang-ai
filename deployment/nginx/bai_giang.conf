# =====================================================================
# Bài Giảng AI — Nginx reverse proxy (optional)
# Đặt vào /etc/nginx/conf.d/ trên VPS, hoặc tham chiếu trong nginx.conf
# =====================================================================

upstream bai_giang_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # đổi thành tên miền của bạn

    # Tăng buffer cho upload
    client_max_body_size 20M;

    # Static files — phục vụ trực tiếp khi có
    location /static/ {
        alias /var/www/bai_giang/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Tất cả phần còn lại proxy về FastAPI
    location / {
        proxy_pass http://bai_giang_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # Healthcheck endpoint — log riêng để dễ debug
    location = /api/health {
        proxy_pass http://bai_giang_app;
        access_log off;
    }
}
